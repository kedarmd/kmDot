#################
# Aesthetics    #
#################

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    layout = master
}

decoration {
    rounding = 8
    active_opacity = 0.99
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 5
        new_optimizations = true
    }
}

# Animations
animations {
    enabled = true
    bezier = fast, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 5, fast
    animation = windowsIn, 1, 5, fast
    animation = windowsOut, 1, 3, fast
    animation = border, 1, 3, fast
    animation = fade, 1, 3, fast
    animation = workspaces, 1, 5, fast
}
