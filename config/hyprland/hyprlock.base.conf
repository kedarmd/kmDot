pam {
  service = login
}

general {
  hide_cursor = true
}

background {
  monitor =
  color = @HYPRLOCK_BG@
}

input-field {
  monitor =
  size = 320, 50
  outline_thickness = 2
  dots_size = 0.25
  dots_spacing = 0.2
  dots_center = true
  fade_on_empty = false
  inner_color = @HYPRLOCK_INNER@
  outer_color = @HYPRLOCK_OUTER@
  font_color = @HYPRLOCK_FONT@
  placeholder_text = Enter password
  position = 0, -20
  halign = center
  valign = center
}

label {
  monitor =
  text = Locked
  color = @HYPRLOCK_LABEL@
  position = 0, 70
  halign = center
  valign = center
}
