# Main mod key
$mod = SUPER

#################
# Keybindings   #
#################

# Apps
bind = $mod, RETURN, exec, /usr/bin/ghostty  # launch the Ghostty terminal
# bind = $mod, T, exec, kitty
bind = $mod, B, exec, zen-browser  # open the Zen browser
bind = $mod, F, exec, /usr/bin/nautilus  # start the nautilus file manager
bind = $mod, space, exec, rofi -show drun  # show rofi application launcher
bind = $mod, T, exec, bash -lc '$HOME/.config/kmdot/rofi/menu/theme-switcher.sh'  # open theme switcher menu
bind = $mod, W, killactive  # close the focused window
bind = $mod SHIFT, E, exit  # exit the Hyprland session
bind = $mod SHIFT, L, exec, hyprlock  # lock the screen with Hyprlock
bind = $mod, ESCAPE, exec, bash -c '$HOME/.config/kmdot/rofi/menu/system.sh'  # open system menu
bind = $mod, R, exec, bash -c '$HOME/.config/kmdot/waybar/scripts/launch.sh'  # run dashboard launch script

# Focus with arrow keys
bind = $mod, left, movefocus, l  # focus the window to the left
bind = $mod, right, movefocus, r  # focus the window to the right
bind = $mod, up, movefocus, u  # focus the window above
bind = $mod, down, movefocus, d  # focus the window below

# (optional) move windows with Shift + arrows
bind = $mod SHIFT, left, movewindow, l  # move the focused window left
bind = $mod SHIFT, right, movewindow, r  # move the focused window right
bind = $mod SHIFT, up, movewindow, u  # move the focused window upward
bind = $mod SHIFT, down, movewindow, d  # move the focused window downward

# (optional) resize with Ctrl + arrows
bind = $mod CTRL, left, resizeactive, -20 0  # shrink the focused window horizontally to the left
bind = $mod CTRL, right, resizeactive, 20 0  # expand the focused window horizontally to the right
bind = $mod CTRL, up, resizeactive, 0 -20  # shrink the focused window vertically upward
bind = $mod CTRL, down, resizeactive, 0 20  # expand the focused window vertically downward

# Layout controls
bind = $mod, S, layoutmsg, swaporientation  # toggle layout orientation
bind = $mod, M, fullscreen, 1  # enable fullscreen for focused window
bind = $mod SHIFT, M, fullscreen, 0  # exit fullscreen for focused window

# Switch to workspace
bind = $mod, 1, workspace, 1  # switch to workspace 1
bind = $mod, 2, workspace, 2  # switch to workspace 2
bind = $mod, 3, workspace, 3  # switch to workspace 3
bind = $mod, 4, workspace, 4  # switch to workspace 4
bind = $mod, 5, workspace, 5  # switch to workspace 5

# Move focsed window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1  # move window to workspace 1
bind = $mod SHIFT, 2, movetoworkspace, 2  # move window to workspace 2
bind = $mod SHIFT, 3, movetoworkspace, 3  # move window to workspace 3
bind = $mod SHIFT, 4, movetoworkspace, 4  # move window to workspace 4
bind = $mod SHIFT, 5, movetoworkspace, 5  # move window to workspace 5

# Toggle floating on the focused window
bind = $mod, G, togglefloating  # toggle floating mode for the focused window

# Mouse: move window when holding Super + Left Click
bindm = $mod, mouse:272, movewindow  # drag with left click to move window
# Mouse: resize window when holding Super + Right Click
bindm = $mod, mouse:273, resizewindow  # drag with right click to resize window

## Brightness controls (no modifiers, just Fn keys → XF86 keys)
bind = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness.sh +5%  # increase screen brightness
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh 5%-  # decrease screen brightness
# && [ "$(brightnessctl get)" -lt 1000 ] && brightnessctl set 1000

# Volume controls
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle  # mute/unmute default sink
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%  # lower volume by 5%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%  # raise volume by 5%

# Screenshots
bind = $mod, PRINT, exec, hyprshot -m window # Screenshot a window
bind = , PRINT, exec, hyprshot -m output # Screenshot a monitor
bind = $mod SHIFT, PRINT, exec, hyprshot -m region # Screenshot a region

# Custom scripts
bind = $mod, J, layoutmsg, orientationcycle left top  # cycle layout orientation presets
bind = SUPER CTRL, SPACE, exec, ~/.config/hypr/scripts/cycle_wallpapers.sh  # rotate wallpapers
